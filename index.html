<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> vaibhavi~🍁 </title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #16404e, #7d5044);
    font-family: 'Poppins', sans-serif;
    text-align: center;
}

.container {
    background: rgb(168, 178, 180);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 350px;
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 32px;
    color: #a1136d;
}

p {
    font-size: 16px;
    color: #161313;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 30px;
    background-color: #ff4b6e;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #ff2e55;
    transform: scale(1.05);
}

#message {
    margin-top: 15px;
    font-weight: 500;
    color: #120508;
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey Vaibhavi ~🍁</h1>
    <p>I just wanted to say...Your smile is beautiful… but the way you talk makes it even better.😌</p>

    <button onclick="showMessage()">Click if you smile 😊</button>

    <div id="message"></div>
</div>

<script>
function showMessage() {
    document.getElementById("message").innerHTML = `
        I knew it! 😄 Keep smiling... it suits you perfectly 💕
        <br><br>

    <img src="vaibhavi.jpg" 
     style="width:180px; height:190px; object-fit:cover; border-radius:50%; 
     box-shadow:0 0 20px #ff4b6e; margin-top:15px;">
`}
</script>

</body>
</html>
